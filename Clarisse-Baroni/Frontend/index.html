<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FCA Refugee Support Program</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Arial Narrow', Arial, sans-serif;
      background: #99CC32;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #landing-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .logo-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-circle img {
      width: 120px;
      height: auto;
    }

    h1 {
      color: #ffffff;
      font-size: 26px;
      font-weight: normal;
      letter-spacing: 2px;
      text-align: center;
    }

    a { text-decoration: none; }

    .register-btn {
      margin-top: 16px;
      background: #ffffff;
      color: #99CC32;
      border: none;
      padding: 14px 0;
      width: 280px;
      font-size: 19px;
      font-family: 'Arial Narrow', Arial, sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 3px;
      box-shadow: 3px 4px 8px rgba(0,0,0,0.3);
    }

    .register-btn:hover { background: #f0f0f0; }
  </style>
